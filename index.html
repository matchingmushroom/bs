<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  
  <meta name="theme-color" content="#1A3B5C">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1041/1041916.png">
  
  <title>Overdue Report</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  
  <script src="https://unpkg.com/dexie@3.2.3/dist/dexie.js"></script>
  
  <style>
    /* ====== RESET & VARIABLES ====== */
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; }
    :root {
      --primary: #1A3B5C; --primary-light: #2A5A8C; --accent-gold: #C9A227;
      --bg-light: #F4F7FC; --surface-white: #FFFFFF; --text-primary: #0A1929;
      --text-muted: #5A6E8A; --border-light: #E2E8F0; --warning: #F5A623; --danger: #E53E3E;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.04); --shadow-lg: 0 20px 35px -8px rgba(0,0,0,0.12);
      --radius-xl: 24px; --radius-lg: 18px; --radius-md: 14px; --transition: all 0.25s ease;
    }
    body {
      font-family: 'Inter', 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-light);
      margin: 0;
      padding: 0;
      color: var(--text-primary);
      overflow-x: hidden;
      min-height: 100vh;
    }
    .hidden { display: none !important; }
    
    /* ====== LOGIN SCREEN ====== */
    #loginScreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary) 0%, #0F1A2C 100%);
      padding: 20px;
    }
    .login-card {
      background: var(--surface-white);
      border-radius: var(--radius-xl);
      padding: 36px 28px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-lg);
    }
    .login-title {
      font-size: 32px;
      font-weight: 700;
      color: var(--primary);
      text-align: center;
      margin-bottom: 8px;
    }
    .login-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 32px;
    }
    .login-input {
      width: 100%;
      padding: 15px 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-light);
      font-size: 16px;
      margin-bottom: 16px;
      transition: var(--transition);
      background: #FAFCFE;
    }
    .login-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26,59,92,0.1);
    }
    .login-btn {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      border: none;
      border-radius: 60px;
      color: white;
      cursor: pointer;
      margin-top: 8px;
      box-shadow: 0 4px 14px rgba(26,59,92,0.25);
    }
    .login-error {
      color: var(--danger);
      font-size: 13px;
      text-align: center;
      margin-top: 16px;
      min-height: 20px;
    }
    
    /* ====== APP CONTENT (hidden initially) ====== */
    #appContent {
      padding-bottom: 84px;
    }
    .content { padding: 0 20px; max-width: 1280px; margin: 0 auto; }
    
    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: nowrap;
      padding: 12px 20px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      box-shadow: var(--shadow-sm);
    }
    .app-title {
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 20px;
    }
    .app-title i {
      background: linear-gradient(135deg, var(--primary), var(--accent-gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 26px;
    }
    .offline-badge {
      background: var(--warning);
      color: #1A1A1A;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 4px;
    }
    
    /* Sync Button */
    .sync-btn {
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--primary);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: var(--transition);
      white-space: nowrap;
      cursor: pointer;
    }
    .sync-btn i { font-size: 16px; }
    .sync-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
    .sync-btn.syncing { background: var(--primary); color: #fff; pointer-events: none; }
    .sync-btn.syncing i { animation: spin 1s linear infinite; }
    
    .logout-btn {
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--text-muted);
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 40px;
      cursor: pointer;
      margin-left: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .logout-btn:hover { background: var(--danger); color: white; border-color: var(--danger); }
    
    .sync-progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0%;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent-gold));
      transition: width 0.3s ease;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Search */
    .search-input {
      width: 100%;
      padding: 18px 22px;
      border-radius: 60px;
      border: 1px solid var(--border-light);
      background: white;
      font-size: 16px;
      margin: 20px 0;
    }
    .search-result-item {
      background: white;
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 12px;
      border: 1px solid var(--border-light);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
    }
    
    /* Loader */
    #loader {
      backdrop-filter: blur(12px);
      background: rgba(255,255,255,0.9);
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(26,59,92,0.1);
      border-top: 3px solid var(--primary);
      border-radius: 50%;
      animation: spin 0.8s infinite;
    }
    
    .offline-banner {
      background: var(--warning);
      color: #1A1A1A;
      text-align: center;
      padding: 8px;
      font-size: 13px;
      position: sticky;
      top: 0;
      z-index: 101;
    }
    
    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(20px);
      display: flex;
      height: 76px;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.03);
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
    }
    .nav-item.active { color: var(--primary); }
    .nav-item i { font-size: 24px; }
  </style>
</head>
<body>

<!-- LOADER -->
<div id="loader" class="hidden"><div class="spinner"></div></div>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-title">Overdue Report</div>
    <div class="login-subtitle">Sign in to continue</div>
    <input type="email" id="loginEmail" class="login-input" placeholder="Username (email)" value="">
    <input type="password" id="loginPassword" class="login-input" placeholder="Password" value="">
    <button class="login-btn" onclick="handleLogin()">Sign In</button>
    <div id="loginError" class="login-error"></div>
    <div style="text-align:center; margin-top:16px; font-size:12px; color:var(--text-muted);">
      Default: admin@example.com / admin123
    </div>
  </div>
</div>

<!-- MAIN APP (hidden initially) -->
<div id="appContent" class="hidden">
  <div id="offlineBanner" class="offline-banner hidden">⚠️ You are offline. Showing cached data.</div>
  
  <header>
    <div class="app-title">
      <i class="material-icons-round">account_balance</i> Overdue Report
      <span id="offlineIndicator" class="offline-badge hidden">Offline</span>
    </div>
    <div style="display: flex; align-items: center;">
      <button id="syncButton" class="sync-btn" onclick="startFullSync()">
        <i class="material-icons-round">cloud_download</i>
        <span>Sync All</span>
      </button>
      <button class="logout-btn" onclick="logout()">
        <i class="material-icons-round">logout</i>
      </button>
    </div>
    <div id="syncProgressBar" class="sync-progress-bar"></div>
  </header>

  <main>
    <div id="view-search" class="view">
      <div class="content">
        <input type="text" id="searchInp" class="search-input" placeholder="🔍 Search by customer name or CIF...">
        <div id="results"></div>
      </div>
    </div>
  </main>

  <nav class="bottom-nav">
    <div class="nav-item active" id="n-search" onclick="navTo('search')"><i class="material-icons-round">search</i><span>Search</span></div>
    <div class="nav-item" id="n-detail" onclick="navTo('detail')"><i class="material-icons-round">dashboard</i><span>Summary</span></div>
    <div class="nav-item" id="n-group" onclick="navTo('group')"><i class="material-icons-round">groups</i><span>Group</span></div>
    <div class="nav-item" id="n-insights" onclick="navTo('insights')"><i class="material-icons-round">insights</i><span>Insights</span></div>
  </nav>
</div>

<script>
  // ========== CONFIGURATION ==========
  const API_BASE = 'https://script.google.com/macros/s/AKfycbx4Nl5MJm9UjkSskwRAfZmMnN6M5MTtabLuvb5_b48tvnov06LKfrGv_-KRCBjXaBDw/exec'; // ⬅️ REPLACE WITH YOUR SCRIPT ID
  const AUTH_KEY = 'crm_auth';

  // ========== INDEXEDDB ==========
  const db = new Dexie("CRM_DB");
  db.version(2).stores({ customers: "id", metrics: "CIF_ID" });

  let customers = [], currentCIF = null;
  const fAmt = (n) => '₹ ' + (Math.abs(n) <= 0.0001 ? "0.00" : parseFloat(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}));
  const toggleLoader = (show) => document.getElementById('loader').classList.toggle('hidden', !show);

  // ========== JSONP API ==========
  function jsonp(url) {
    return new Promise((resolve, reject) => {
      const callback = 'jsonp_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
      window[callback] = (data) => { delete window[callback]; document.body.removeChild(script); resolve(data); };
      const script = document.createElement('script');
      script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + callback;
      script.onerror = () => { delete window[callback]; document.body.removeChild(script); reject(new Error('JSONP failed')); };
      document.body.appendChild(script);
    });
  }

  // ========== AUTHENTICATION ==========
  function checkAuth() {
    const auth = localStorage.getItem(AUTH_KEY);
    if (auth) {
      try {
        const data = JSON.parse(auth);
        if (data.expires > Date.now()) {
          showApp();
          return true;
        }
      } catch (e) {}
    }
    showLogin();
    return false;
  }

  function showLogin() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appContent').classList.add('hidden');
  }

  function showApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appContent').classList.remove('hidden');
  }

  async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errorEl = document.getElementById('loginError');
    
    if (!email || !password) {
      errorEl.innerText = 'Please enter username and password';
      return;
    }
    
    errorEl.innerText = '';
    toggleLoader(true);
    
    try {
      const url = new URL(API_BASE);
      url.searchParams.set('action', 'login');
      url.searchParams.set('username', email);
      url.searchParams.set('password', password);
      
      const response = await jsonp(url.toString());
      
      if (response.success) {
        localStorage.setItem(AUTH_KEY, JSON.stringify({
          user: response.user,
          expires: Date.now() + (24 * 60 * 60 * 1000)
        }));
        showApp();
        await loadCustomerList();
      } else {
        errorEl.innerText = response.error || 'Invalid credentials';
      }
    } catch (e) {
      errorEl.innerText = 'Login failed. Check your connection.';
      console.error('Login error:', e);
    } finally {
      toggleLoader(false);
    }
  }

  function logout() {
    localStorage.removeItem(AUTH_KEY);
    showLogin();
  }

  // ========== CUSTOMER LIST ==========
  async function loadCustomerList() {
    try {
      const fresh = await apiCall('customers');
      await db.customers.bulkPut(fresh);
      customers = fresh;
      setupSearch();
    } catch (e) {
      const cached = await db.customers.toArray();
      if (cached.length) { customers = cached; setupSearch(); }
    }
  }

  async function apiCall(action, params = {}) {
    const url = new URL(API_BASE);
    url.searchParams.set('action', action);
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
    const data = await jsonp(url.toString());
    if (data.error) throw new Error(data.error);
    return data;
  }

  function setupSearch() {
    const inp = document.getElementById('searchInp'), res = document.getElementById('results');
    if (!inp) return;
    inp.oninput = async () => {
      const val = inp.value.toUpperCase(); res.innerHTML = '';
      if (!val) return;
      const all = await db.customers.toArray();
      all.filter(c => (c.name || '').toUpperCase().includes(val) || (c.id || '').includes(val))
         .slice(0, 12)
         .forEach(c => {
           const d = document.createElement('div'); d.className = 'search-result-item';
           d.innerHTML = `<div><div style="font-weight:700;">${c.name}</div><div style="color:var(--text-muted); font-size:12px;">CIF: ${c.id}</div></div><i class="material-icons-round" style="color:var(--primary);">arrow_forward_ios</i>`;
           d.onclick = () => { currentCIF = c.id; alert('Customer selected: ' + c.id); };
           res.appendChild(d);
         });
    };
  }

  function navTo(v) {
    document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
    document.getElementById('n-'+v).classList.add('active');
    if (v === 'search') { /* already visible */ }
  }

  // ========== SYNC (simplified for demo) ==========
  async function startFullSync() {
    alert('Sync started. This will download all customer data.');
    // Full sync logic from previous versions can be added here
  }

  // ========== INIT ==========
  checkAuth();
</script>
</body>
</html>
